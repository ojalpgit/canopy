<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in – Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="welcome.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="welcome-page login-page">
  <main class="welcome-screen login-screen">
    <a href="index.html" class="login-back-link" aria-label="Back">←</a>
    <div class="welcome-logo-pill login-logo-pill" aria-hidden="true">
      <span class="welcome-logo-text">Canopy</span>
    </div>
    <form id="login-form" class="login-form" novalidate>
      <label class="login-label" for="login-email">Email (@wisc.edu)</label>
      <input
        type="email"
        id="login-email"
        class="login-input"
        placeholder="you@wisc.edu"
        autocomplete="email"
        required
      />
      <span id="login-email-error" class="login-error" aria-live="polite"></span>

      <label class="login-label" for="login-password">Password</label>
      <input
        type="password"
        id="login-password"
        class="login-input"
        placeholder="••••••••"
        autocomplete="current-password"
        required
        minlength="6"
      />
      <span id="login-password-error" class="login-error" aria-live="polite"></span>

      <button type="submit" class="welcome-btn login-submit" id="login-submit">Log in</button>
      <p id="login-firebase-error" class="login-error login-error-block" aria-live="assertive"></p>
    </form>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
