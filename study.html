<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study – Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="study.css" />
</head>
<body class="study-page">
  <header class="study-header">
    <a href="home.html" class="back-link" aria-label="Back to home">
      <span class="back-arrow">←</span>
    </a>
    <h1 class="study-title">Study</h1>
    <div class="study-coins" aria-label="Coins">
      <span class="study-coins-icon">🪙</span>
      <span id="study-coin-count" class="study-coins-value">0</span>
    </div>
  </header>

  <main class="study-main">
    <div class="study-plant-wrap">
      <img src="assets/plant.svg" alt="Potted plant" class="study-plant" width="64" height="80" />
    </div>

    <section class="study-nearby" id="nearby-section">
      <h2 class="study-nearby-heading">Who's nearby?</h2>
      <p class="study-nearby-hint" id="nearby-hint">Finding people near you...</p>
      <ul class="study-nearby-list" id="nearby-list" role="list" aria-label="Nearby users"></ul>
    </section>

    <section class="studying-with" id="studying-with-section">
      <h2 class="studying-with-heading">Studying With:</h2>
      <div class="studying-avatar" id="studying-avatar" aria-hidden="true"></div>
      <span class="studying-name" id="studying-name">Select someone above</span>
    </section>

    <div class="study-timer-actions">
      <button type="button" class="study-start-btn" id="start-timer-btn" hidden>
        Start timer
      </button>
      <button type="button" class="study-btn study-pause-btn" id="pause-timer-btn" hidden>Pause</button>
      <button type="button" class="study-btn study-stop-btn" id="stop-timer-btn" hidden>Stop</button>
    </div>

    <div class="time-elapsed-box" id="timer-box">
      <span class="time-elapsed-label">Time Elapsed:</span>
      <span class="time-elapsed-value" id="timer">00:00</span>
    </div>
  </main>

  <footer class="grass-strip" aria-hidden="true"></footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="study.js"></script>
</body>
</html>
