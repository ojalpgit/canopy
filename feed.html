<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed – Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="feed.css" />
</head>
<body class="feed-page">
  <header class="feed-header">
    <a href="index.html" class="feed-back-link" aria-label="Back to home">
      <span class="feed-back-arrow">←</span>
    </a>
    <a href="messages.html" class="feed-chat-link" aria-label="Messages">
      <svg class="feed-chat-icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <path fill="#1a1a1a" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
      </svg>
    </a>
  </header>

  <main class="feed-main">
    <section class="feed-banner your-feed-banner">
      <h1 class="feed-banner-title">Your Feed</h1>
    </section>

    <section class="feed-content" id="feed-content">
      <!-- Post cards rendered by JS: title + description preview; click opens full post -->
    </section>

    <section class="critters-section">
      <section class="feed-banner critters-banner">
        <h2 class="feed-banner-title">Critters Near You!</h2>
      </section>

      <section class="critters-grid" id="critters-grid">
      <!-- Critters rendered by JS; click opens profile -->
      </section>
    </section>
  </main>

  <footer class="grass-strip" aria-hidden="true"></footer>

  <!-- Full post overlay (author, title, full description) -->
  <div class="feed-overlay" id="post-overlay" role="dialog" aria-modal="true" aria-labelledby="post-modal-title" hidden>
    <div class="feed-overlay-backdrop" id="post-overlay-backdrop"></div>
    <div class="feed-modal feed-post-modal">
      <button type="button" class="feed-modal-close" id="post-modal-close" aria-label="Close">×</button>
      <p class="feed-post-author" id="post-modal-author"></p>
      <h2 class="feed-post-modal-title" id="post-modal-title"></h2>
      <p class="feed-post-modal-desc" id="post-modal-desc"></p>
    </div>
  </div>

  <!-- Critter profile overlay -->
  <div class="feed-overlay" id="profile-overlay" role="dialog" aria-modal="true" aria-labelledby="profile-modal-name" hidden>
    <div class="feed-overlay-backdrop" id="profile-overlay-backdrop"></div>
    <div class="feed-modal feed-profile-modal">
      <button type="button" class="feed-modal-close" id="profile-modal-close" aria-label="Close">×</button>
      <div class="feed-profile-avatar" id="profile-modal-avatar"></div>
      <h2 class="feed-profile-name" id="profile-modal-name"></h2>
      <p class="feed-profile-bio" id="profile-modal-bio"></p>
      <a href="study.html" class="feed-profile-study-btn">Study together</a>
    </div>
  </div>

  <script>
    (function() {
      var PREVIEW_LENGTH = 60;

      var posts = [
        {
          id: '1',
          authorName: 'Alex',
          title: 'Need help with Calculus 2',
          description: 'Stuck on series and convergence. Anyone free to study together this week? I\'m usually at the library in the afternoon. We could do a focus session.'
        },
        {
          id: '2',
          authorName: 'Sam',
          title: 'Python project partner?',
          description: 'Looking for someone to pair on the data viz assignment. I have the dataset ready and we can split the analysis and write-up. DM me if interested!'
        },
        {
          id: '3',
          authorName: 'Jordan',
          title: 'Organic chemistry study group',
          description: 'Forming a small group for the midterm. We can meet twice a week and go through problem sets. Reply here or message me to join.'
        }
      ];

      var critters = [
        { id: 'c1', name: 'Alex', bio: 'Into math & coding. Down to study or chat.' },
        { id: 'c2', name: 'Sam', bio: 'Python and data science. Library regular.' },
        { id: 'c3', name: 'Jordan', bio: 'Pre-med, loves study sessions.' },
        { id: 'c4', name: 'Riley', bio: 'Design and front-end. Always up for focus time.' }
      ];

      var feedEl = document.getElementById('feed-content');
      var gridEl = document.getElementById('critters-grid');
      var postOverlay = document.getElementById('post-overlay');
      var postBackdrop = document.getElementById('post-overlay-backdrop');
      var postClose = document.getElementById('post-modal-close');
      var postAuthor = document.getElementById('post-modal-author');
      var postTitle = document.getElementById('post-modal-title');
      var postDesc = document.getElementById('post-modal-desc');
      var profileOverlay = document.getElementById('profile-overlay');
      var profileBackdrop = document.getElementById('profile-overlay-backdrop');
      var profileClose = document.getElementById('profile-modal-close');
      var profileAvatar = document.getElementById('profile-modal-avatar');
      var profileName = document.getElementById('profile-modal-name');
      var profileBio = document.getElementById('profile-modal-bio');

      function preview(text) {
        if (!text || text.length <= PREVIEW_LENGTH) return text;
        return text.slice(0, PREVIEW_LENGTH).trim() + '...';
      }

      function renderFeed() {
        if (!feedEl) return;
        feedEl.innerHTML = '';
        posts.forEach(function(p) {
          var article = document.createElement('article');
          article.className = 'feed-card feed-card-clickable';
          article.setAttribute('data-post-id', p.id);
          article.innerHTML =
            '<h2 class="feed-card-title">' + escapeHtml(p.title) + '</h2>' +
            '<p class="feed-card-desc">' + escapeHtml(preview(p.description)) + '</p>';
          article.addEventListener('click', function() { openPost(p); });
          feedEl.appendChild(article);
        });
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function openPost(post) {
        if (postAuthor) postAuthor.textContent = 'By ' + post.authorName;
        if (postTitle) postTitle.textContent = post.title;
        if (postDesc) postDesc.textContent = post.description;
        if (postOverlay) {
          postOverlay.hidden = false;
          document.body.classList.add('feed-modal-open');
        }
      }

      function closePost() {
        if (postOverlay) postOverlay.hidden = true;
        document.body.classList.remove('feed-modal-open');
      }

      function renderCritters() {
        if (!gridEl) return;
        gridEl.innerHTML = '';
        critters.forEach(function(c) {
          var item = document.createElement('div');
          item.className = 'critter-item';
          item.innerHTML =
            '<button type="button" class="critter-button" data-critter-id="' + escapeHtml(c.id) + '">' +
              '<span class="critter-circle" aria-hidden="true"></span>' +
              '<span class="critter-name">' + escapeHtml(c.name) + '</span>' +
            '</button>';
          var btn = item.querySelector('.critter-button');
          btn.addEventListener('click', function() { openProfile(c); });
          gridEl.appendChild(item);
        });
      }

      function openProfile(critter) {
        if (profileName) profileName.textContent = critter.name;
        if (profileBio) profileBio.textContent = critter.bio || 'No bio yet.';
        if (profileOverlay) {
          profileOverlay.hidden = false;
          document.body.classList.add('feed-modal-open');
        }
      }

      function closeProfile() {
        if (profileOverlay) profileOverlay.hidden = true;
        document.body.classList.remove('feed-modal-open');
      }

      if (postClose) postClose.addEventListener('click', closePost);
      if (postBackdrop) postBackdrop.addEventListener('click', closePost);
      if (profileClose) profileClose.addEventListener('click', closeProfile);
      if (profileBackdrop) profileBackdrop.addEventListener('click', closeProfile);

      renderFeed();
      renderCritters();
    })();
  </script>
</body>
</html>
