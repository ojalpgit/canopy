<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed – Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="feed.css" />
</head>
<body class="feed-page">
  <header class="feed-header">
    <a href="home.html" class="feed-back-link" aria-label="Back to home">
      <span class="feed-back-arrow">←</span>
    </a>
    <a href="messages.html" class="feed-chat-link" aria-label="Messages">
      <svg class="feed-chat-icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <path fill="#1a1a1a" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
      </svg>
    </a>
  </header>

  <main class="feed-main">
  <section class="feed-banner your-feed-banner">
    <h1 class="feed-banner-title">Your Feed</h1>
  </section>

  <section id="create-post-box" class="feed-card" style="margin: 20px; border: 2px dashed #6D4C3D; padding: 15px; background: rgba(255,255,255,0.1);">
    <h2 id="create-box-header" style="margin-bottom: 10px;">Create a Study Request</h2>
    
    <input type="text" id="new-post-title" placeholder="Subject..." style="width: 100%; margin-bottom: 8px; font-family: 'Press Start 2P', cursive; font-size: 8px; border: 1px solid #6D4C3D; padding: 8px; box-sizing: border-box;">
    
    <textarea id="new-post-desc" placeholder="Details..." style="width: 100%; height: 60px; margin-bottom: 8px; font-family: 'Press Start 2P', cursive; font-size: 8px; border: 1px solid #6D4C3D; padding: 8px; box-sizing: border-box;"></textarea>
    
    <button id="submit-post-btn" style="background: #6D4C3D; color: #EBE6D3; border: none; padding: 10px; width: 100%; font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer;">POST TO FEED</button>
</section>

  <section class="feed-content" id="feed-content">
    </section>


    <section class="critters-section">
      <section class="feed-banner critters-banner">
        <h2 class="feed-banner-title">Critters Near You!</h2>
      </section>

      <section class="critters-grid" id="critters-grid">
      <!-- Critters rendered by JS; click opens profile -->
      </section>
    </section>
  </main>

  <footer class="grass-strip" aria-hidden="true"></footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="friends.js"></script>
  <script src="feed-nearby.js"></script>

  <!-- Full post overlay (author, title, full description) -->
  <div class="feed-overlay" id="post-overlay" role="dialog" aria-modal="true" aria-labelledby="post-modal-title" hidden>
    <div class="feed-overlay-backdrop" id="post-overlay-backdrop"></div>
    <div class="feed-modal feed-post-modal">
      <button type="button" class="feed-modal-close" id="post-modal-close" aria-label="Close">×</button>
      <p class="feed-post-author" id="post-modal-author"></p>
      <h2 class="feed-post-modal-title" id="post-modal-title"></h2>
      <p class="feed-post-modal-desc" id="post-modal-desc"></p>
    </div>
  </div>

  <!-- Critter profile overlay (avatar content set by feed-nearby.js when opening) -->
  <div class="feed-overlay" id="profile-overlay" role="dialog" aria-modal="true" aria-labelledby="profile-modal-name" hidden>
    <div class="feed-overlay-backdrop" id="profile-overlay-backdrop"></div>
    <div class="feed-modal feed-profile-modal">
      <button type="button" class="feed-modal-close" id="profile-modal-close" aria-label="Close">×</button>
      <div class="feed-profile-avatar feed-profile-avatar-wrap" id="profile-modal-avatar"></div>
      <h2 class="feed-profile-name" id="profile-modal-name"></h2>
      <p class="feed-profile-bio" id="profile-modal-bio"></p>
      <div class="feed-profile-friend-action" id="profile-modal-friend-action"></div>
      <a href="study.html" class="feed-profile-study-btn">Study together</a>
      <a href="#" class="feed-profile-study-btn feed-profile-msg-btn" id="profile-modal-msg-link">Message</a>
    </div>
  </div>

  <script>
    (function() {
      // 1. Link to the database your partner set up
      // We assume they named it 'db' in firebase-config.js
      const db = firebase.firestore(); 

      var PREVIEW_LENGTH = 60;
      var feedEl = document.getElementById('feed-content');
      
      // ... (Keeping all your existing UI functions: openPost, closePost, etc.) ...
      function preview(text) {
        if (!text || text.length <= PREVIEW_LENGTH) return text;
        return text.slice(0, PREVIEW_LENGTH).trim() + '...';
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      // 2. THE POST FUNCTION
      const submitBtn = document.getElementById('submit-post-btn');
      if (submitBtn) {
        submitBtn.addEventListener('click', async () => {
          const titleInput = document.getElementById('new-post-title');
          const descInput = document.getElementById('new-post-desc');
          
          if (!titleInput.value || !descInput.value) {
            alert("Fill in both fields first!");
            return;
          }

          try {
            // This sends the data to your 'posts' collection
            await db.collection("posts").add({
              title: titleInput.value,
              description: descInput.value,
              authorName: "Manasvi", 
              createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            });

            titleInput.value = '';
            descInput.value = '';
            alert("Study request posted!");
            
            // Optional: Refresh page to see the new post
            location.reload(); 
          } catch (error) {
            console.error("Post failed:", error);
            alert("Error: Check your Firebase 'Rules' tab and set to Test Mode!");
          }
        });
      }

      // Existing UI logic
      function renderFeed() {
  if (!feedEl) return;

  db.collection("posts").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
    console.log("Database update! Found " + snapshot.size + " posts.");
    
    // 1. Clear the feed FIRST so we don't duplicate posts
    feedEl.innerHTML = ''; 

    if (snapshot.empty) {
      feedEl.innerHTML = '<p style="text-align:center; font-size:10px; color:#6D4C3D;">No posts yet!</p>';
      return;
    }

    // 2. Loop through each post in Firebase
    snapshot.forEach((doc) => {
      const p = doc.data();
      const article = document.createElement('article');
      article.className = 'feed-card feed-card-clickable';
      
      // 3. Set the HTML (Added the border and spacing for readability)
      article.innerHTML = `
        <div style="border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 10px; padding-bottom: 5px;">
          <h2 class="feed-card-title" style="line-height: 1.5; margin-bottom: 4px;">${escapeHtml(p.title || "Untitled")}</h2>
          <p style="font-size: 7px; color: #EBE6D3; opacity: 0.8; margin: 0;">Posted By: ${escapeHtml(p.authorName || "Anonymous")}</p>
        </div>
        <p class="feed-card-desc" style="line-height: 1.6;">${escapeHtml(preview(p.description || ""))} </p>
      `;
      
      article.addEventListener('click', function() { openPost(p); });
      feedEl.appendChild(article);
    });
  }, (error) => {
    console.error("Firebase Read Error:", error);
  });
}

      // IMPORTANT: You must actually CALL the function at the bottom
      renderFeed();

      // ... rest of your existing modal listeners ...
    })();
  </script>
</body>
</html>
