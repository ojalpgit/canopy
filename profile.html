<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body class="profile-page">
  <header class="profile-header">
    <a href="home.html" class="profile-back-link" aria-label="Back to home">
      <span class="profile-back-arrow">←</span>
    </a>
    <div class="profile-banner">
      <h1 class="profile-banner-title">Profile</h1>
    </div>
    <a href="#" class="profile-settings-link" aria-label="Settings">
      <span class="profile-settings-icon">⚙</span>
    </a>
  </header>

  <main class="profile-main">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profile-avatar" aria-hidden="true"></div>
    </div>
    <p class="profile-name" id="profile-name">Your Name</p>
    <p class="profile-member-since" id="profile-member-since">Member since …</p>

    <section class="profile-bio-section">
      <h2 class="profile-bio-heading">Bio</h2>
      <p class="profile-bio-text" id="profile-bio-text"></p>
      <div class="profile-bio-edit" id="profile-bio-edit" hidden>
        <textarea id="profile-bio-input" class="profile-bio-textarea" placeholder="Write a short bio..." maxlength="200" rows="3"></textarea>
        <div class="profile-bio-actions">
          <button type="button" class="profile-btn profile-btn-save" id="profile-bio-save">Save</button>
          <button type="button" class="profile-btn profile-btn-cancel" id="profile-bio-cancel">Cancel</button>
        </div>
      </div>
      <button type="button" class="profile-btn profile-edit-bio-btn" id="profile-edit-bio-btn">Edit bio</button>
    </section>

    <section class="profile-stats">
      <div class="profile-stat-card">
        <span class="profile-stat-label">TOTAL FOCUS</span>
        <span class="profile-stat-value" id="total-focus">00:00</span>
      </div>
      <div class="profile-stat-card">
        <span class="profile-stat-label">PLANTS GROWN</span>
        <span class="profile-stat-value" id="plants-grown">0</span>
      </div>
    </section>

    <section class="profile-friend-requests" id="profile-friend-requests-section">
      <h2 class="profile-friend-heading">FRIEND REQUESTS</h2>
      <div class="profile-friend-requests-list" id="profile-friend-requests-list"></div>
    </section>

    <section class="profile-friends" id="profile-friends-section">
      <h2 class="profile-friend-heading">FRIENDS</h2>
      <div class="profile-friends-list" id="profile-friends-list"></div>
    </section>

    <section class="profile-badges">
      <h2 class="profile-badges-heading">RECENT BADGES</h2>
      <div class="profile-badges-grid">
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="friends.js"></script>
  <script src="profile.js"></script>
</body>
</html>
