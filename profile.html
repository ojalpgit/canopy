<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body class="profile-page">
  <header class="profile-header">
    <a href="index.html" class="profile-back-link" aria-label="Back to home">
      <span class="profile-back-arrow">←</span>
    </a>
    <div class="profile-banner">
      <h1 class="profile-banner-title">Profile</h1>
    </div>
    <a href="#" class="profile-settings-link" aria-label="Settings">
      <span class="profile-settings-icon">⚙</span>
    </a>
  </header>

  <main class="profile-main">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" aria-hidden="true"></div>
    </div>
    <p class="profile-name">Your Name</p>
    <p class="profile-member-since">Member since Feb 2026</p>

    <section class="profile-stats">
      <div class="profile-stat-card">
        <span class="profile-stat-label">TOTAL FOCUS</span>
        <span class="profile-stat-value" id="total-focus">00:00</span>
      </div>
      <div class="profile-stat-card">
        <span class="profile-stat-label">PLANTS GROWN</span>
        <span class="profile-stat-value" id="plants-grown">0</span>
      </div>
    </section>

    <section class="profile-badges">
      <h2 class="profile-badges-heading">RECENT BADGES</h2>
      <div class="profile-badges-grid">
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
        <div class="profile-badge-slot" aria-hidden="true"><span class="profile-badge-icon">★</span></div>
      </div>
    </section>
  </main>
</body>
</html>
